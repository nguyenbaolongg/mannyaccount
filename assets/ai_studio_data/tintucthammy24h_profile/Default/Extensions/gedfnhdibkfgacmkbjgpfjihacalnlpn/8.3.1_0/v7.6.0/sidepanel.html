<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Auto Whisk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <style>
    @keyframes move-stars-slow { from { background-position-x: 0; } to { background-position-x: -10000px; } }
    @keyframes move-stars-fast { from { background-position-x: 0; } to { background-position-x: -10000px; } }
    @keyframes shooting-star {
      0% { transform: translate(450px, -50px) scale(0.5); opacity: 1; }
      70% { opacity: 1; }
      100% { transform: translate(-450px, 450px) scale(1); opacity: 0; }
    }
    :root {
      --bg-color: #1a202c; --text-color: #e8eaed; --text-secondary: #9aa0a6;
      --primary-color: #8ab4f8; --secondary-color: #3c4043; --success-color: #81c995;
      --warning-color: #fdd663; --error-color: #f28b82; --border-color: #5f6368;
      --border-radius: 8px; --font-family: 'Nunito', sans-serif;
      --font-size-base: 0.95rem; --font-size-md: 1.1rem;
    }
    html { font-size: 14px; }
    body { width: 100%; color: var(--text-color); font-family: var(--font-family); padding: 0; margin: 0; background-color: var(--bg-color); overflow: hidden; height: 100vh; display: flex; flex-direction: column; position: relative; }
    
    body::before, body::after { content: ''; position: absolute; top: 0; left: 0; width: 200%; height: 100%; z-index: 0; background-repeat: repeat; pointer-events: none; }
    body::before { background-image: radial-gradient(1px 1px at 20px 30px, #fff, transparent), radial-gradient(1px 1px at 40px 80px, #fff, transparent); background-size: 200px 200px; animation: move-stars-slow 200s linear infinite; }
    body::after { background-image: radial-gradient(2px 2px at 50px 50px, #fff, transparent); background-size: 250px 250px; animation: move-stars-fast 100s linear infinite; }
    .shooting-star { position: absolute; top: 0; left: 0; width: 3px; height: 3px; background-color: white; border-radius: 50%; box-shadow: 0 0 10px 2px white; opacity: 0; animation: shooting-star 15s ease-in-out 7s infinite; }
    
    #main-interface { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; width: 100%; }

    #top-panel { height: 50%; display: flex; flex-direction: column; padding: 15px 15px 0 15px; overflow: hidden; border-bottom: 1px solid var(--border-color); background-color: rgba(26, 32, 44, 0.8); transition: height 0.3s ease; }
    #bottom-panel { height: 50%; display: flex; flex-direction: column; padding: 10px 15px 15px 15px; background-color: rgba(0, 0, 0, 0.2); overflow: hidden; transition: height 0.3s ease; }
    #top-panel.full-height { height: 100%; border-bottom: none; }
    #bottom-panel.hidden { height: 0; padding: 0; overflow: hidden; }

    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-shrink: 0; }
    .header img { width: 48px; height: 48px; }
    .header .title-group { display: flex; flex-direction: column; }
    .header .tool-name { font-size: 1.5rem; font-weight: 700; margin: 0; color: white; text-shadow: 0 0 8px rgba(255, 255, 255, 0.5); }
    .header .author-name { margin: 0; font-size: 0.8rem; color: var(--text-secondary); line-height: 1.4; }
    .header .author-name a { color: inherit; text-decoration: none; transition: color 0.2s; }
    .header .author-name a:hover { color: var(--primary-color); }

    .donate-link { margin-left: auto; text-decoration: none; display: flex; align-items: center; gap: 6px; padding: 5px 8px; color: var(--warning-color); background-color: rgba(253, 214, 99, 0.1); border-radius: 20px; transition: all 0.2s; }
    .donate-link:hover { color: #000; background-color: var(--warning-color); }
    .donate-icon { font-size: 1.6em; }
    .donate-text { font-size: var(--font-size-base); font-weight: 600; }

    .tabs { display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 15px; flex-shrink: 0; }
    .tab-button { flex: 1; padding: 10px 15px; border: none; border-bottom: 3px solid transparent; color: var(--text-secondary); font-size: var(--font-size-base); font-weight: 700; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .tab-button.active { color: #f39c12; border-bottom-color: #f39c12; }
    .tab-content { flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; }
    .tab-pane { display: none; flex-direction: column; height: 100%; }
    .tab-pane.active { display: flex; }

    textarea, input, select, button { font-family: var(--font-family); }
    textarea, input[type="text"], input[type="number"], select { width: 100%; background-color: var(--secondary-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: var(--border-radius); padding: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: var(--font-size-base); }
    textarea:focus, input:focus, select:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(138, 180, 248, 0.4); }
    #prompts { flex-grow: 1; min-height: 80px; height: auto; resize: vertical; margin-bottom: 10px; background-color: rgba(0,0,0,0.2); }
    
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border-color); }
    .section-title { font-size: var(--font-size-md); font-weight: 700; color: var(--primary-color); text-transform: capitalize; }
    #uploadPromptButton { font-size: 0.8rem; padding: 4px 8px; background: var(--secondary-color); color: var(--text-color); border: 1px solid var(--border-color); cursor: pointer; display: flex; align-items: center; gap: 5px; margin-bottom: 0; }

    .config-row { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 8px; align-items: end; margin-bottom: 10px; }
    .config-row label { font-size: 0.75rem; color: #bdc1c6; display: block; margin-bottom: 4px; }
    .config-row select, .config-row button { height: 36px; margin-bottom: 0; }
    
    #openRefButton { background-color: #34495e; color: #fff; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; gap: 5px; padding: 0 8px; white-space: nowrap; font-size: 0.8rem; }
    #openRefButton:hover { border-color: var(--primary-color); }

    .action-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; margin-top: auto; flex-shrink: 0; }
    button { background-color: var(--secondary-color); color: var(--text-color); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 10px 15px; cursor: pointer; font-size: var(--font-size-base); font-weight: 600; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    button:hover:not(:disabled) { background-color: #4d5155; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    #mainActionButton { background-color: var(--primary-color); border-color: var(--primary-color); color: #202124; font-weight: 700; }
    #stopButton { background-color: var(--error-color); border-color: var(--error-color); color: white; }

    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 10px; align-items: center; margin-bottom: 10px; }
    .settings-grid label { text-align: right; color: #bdc1c6; font-size: var(--font-size-base); margin: 0; white-space: nowrap; }
    .settings-grid input[type="text"], .settings-grid select { width: 100%; margin-bottom: 0; }
    .settings-grid input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin: 0; }
    
    .settings-subheader { grid-column: 1 / -1; font-size: var(--font-size-md); font-weight: 700; color: var(--primary-color); text-transform: capitalize; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; margin-top: 8px; margin-bottom: 5px; }

    .status-area { background: rgba(0,0,0,0.2); border-radius: var(--border-radius); padding: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); flex-shrink: 0; }
    #progressBar { width: 100%; margin-bottom: 8px; }
    #liveStatus { font-size: var(--font-size-base); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    #resultsTableContainer { flex: 1; overflow: auto; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: var(--border-radius); position: relative; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; table-layout: fixed; }
    th { position: sticky; top: 0; background: rgba(45, 49, 53, 0.95); color: var(--primary-color); padding: 8px; z-index: 2; text-align: center; border-bottom: 1px solid var(--border-color); }
    td { padding: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; }
    
    .col-id { width: 30px; text-align: center; color: var(--text-secondary); padding-top: 8px; }
    .col-prompt textarea { width: 100%; height: 40px; background: transparent; border: 1px dashed #5f6368; padding: 4px; color: var(--text-color); border-radius: 4px; resize: none; font-size: 0.8rem; margin-bottom: 0; scrollbar-width: none; -ms-overflow-style: none; }
    .col-prompt textarea::-webkit-scrollbar { display: none; }
    .col-prompt textarea:focus { border-color: var(--primary-color); background: rgba(0,0,0,0.2); }
    .col-img { width: 55px; text-align: center; }
    .img-cell { width: 45px; height: 45px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; border: 1px solid transparent; overflow: hidden; margin: 0 auto; }
    .img-cell:hover { border-color: var(--primary-color); }
    .img-cell img { width: 100%; height: 100%; object-fit: contain; }
    .col-status { width: 35px; text-align: center; padding-top: 8px; }
    .btn-retry-row { background: transparent; border: none; color: var(--warning-color); padding: 0; width: 100%; cursor: pointer; }
    #retryAllButton { margin-top: 5px; width: 100%; background: var(--warning-color); color: #000; font-weight: bold; padding: 10px; border: none; border-radius: 4px; cursor: pointer; display: none; align-items: center; justify-content: center; gap: 5px; flex-shrink: 0; }

    .tool-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 10px; }
    .tool-card { display: flex; align-items: center; gap: 15px; background-color: var(--secondary-color); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 15px; text-decoration: none; color: var(--text-color); transition: all 0.2s; }
    .tool-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); border-color: var(--primary-color); }
    .tool-card-icon { font-size: 2.5rem; color: var(--primary-color); flex-shrink: 0; line-height: 1; }
    .tool-card-content { display: flex; flex-direction: column; }
    .tool-card-title { font-size: 1.1rem; font-weight: 700; margin: 0; color: var(--text-color); }
    .tool-card-desc { font-size: var(--font-size-base); color: var(--text-secondary); margin: 0; }
    
    #imageModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
    #imageModal img { max-width: 90%; max-height: 85%; border: 2px solid white; border-radius: 4px; }
    #modalClose { position: absolute; top: 20px; right: 30px; color: white; cursor: pointer; font-size: 3rem; }

    /* --- REF MODAL STYLES (UPDATED) --- */
    #refModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 90; align-items: center; justify-content: center; }
    .ref-content { width: 95%; max-width: 600px; height: 90%; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; display: flex; flex-direction: column; padding: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .ref-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
    .ref-title { font-size: 1.2rem; font-weight: 700; color: var(--primary-color); margin: 0; }
    .ref-close { cursor: pointer; color: var(--text-secondary); font-size: 1.5rem; line-height: 1; }
    
    .ref-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    /* Dòng gạch ngang giữa các phần */
    .ref-section { border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px; }
    .ref-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    
    .ref-group-title { font-size: 0.9rem; font-weight: 700; color: #fff; margin-bottom: 8px; display: block; }
    .ref-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    
    .ref-item-container { display: flex; flex-direction: column; gap: 5px; }
    .ref-slot { aspect-ratio: 16/9; background: var(--secondary-color); border: 2px dashed var(--border-color); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; transition: all 0.2s; }
    .ref-slot:hover { border-color: var(--primary-color); background: rgba(138, 180, 248, 0.1); }
    .ref-slot img { width: 100%; height: 100%; object-fit: cover; }
    .ref-slot span { font-size: 1.5rem; color: var(--text-secondary); }
    .ref-remove { position: absolute; top: 2px; right: 2px; background: rgba(231, 76, 60, 0.9); color: #fff; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 2; }
    
    /* Caption height doubled */
    .ref-caption { width: 100%; height: 80px; background: #f9f9f9; border: 1px solid #ddd; color: #333; font-size: 0.75rem; padding: 4px; border-radius: 4px; resize: none; }
    .ref-caption:focus { border-color: var(--primary-color); }
    .ref-caption.analyzed { background: #e8f5e9; border-color: #a5d6a7; }

    .ref-footer { margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 10px; }
    .ref-btn { padding: 8px 16px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: #fff; display: flex; align-items: center; gap: 6px; }
    .btn-upload { background-color: #3498db; }
    .btn-save-cap { background-color: #e67e22; }
    .btn-confirm { background-color: #27ae60; }
  </style>
</head>
<body>
  <div class="shooting-star"></div>
  <div id="main-interface">
    <div id="top-panel">
        <div class="header">
          <!-- Nút Quay lại Menu chính -->
          <a href="../gateway.html" title="Quay lại chọn phiên bản" style="color: #fff; margin-right: 10px; text-decoration: none; display: flex; align-items: center;">
            <span class="material-symbols-outlined">home</span>
          </a>
          
          <!-- Logo: Đã sửa đường dẫn thành ../images/ -->
          <img src="../images/logo.png" alt="Logo">
          <div class="title-group">
            <h3 class="tool-name">Auto Whisk</h3>
            <p class="author-name" id="author-info">
            </p>
          </div>
          <a href="#" id="donate-link-anchor" target="_blank" rel="noopener noreferrer" class="donate-link" data-lang-title="donate_title" title="Mời tác giả một ly cà phê!">
            <span class="donate-icon">☕️</span>
            <span class="donate-text" data-lang-key="buy_me_a_coffee">Mời tôi ly cà phê</span>
          </a>
        </div>
        
        <div class="tabs">
          <button class="tab-button active" data-tab="control"><span class="material-symbols-outlined">play_circle</span> <span data-lang-key="tab_control">Điều Khiển</span></button>
          <button class="tab-button" data-tab="settings"><span class="material-symbols-outlined">settings</span> <span data-lang-key="tab_settings">Cài Đặt</span></button>
          <button class="tab-button" data-tab="tools"><span class="material-symbols-outlined">extension</span> <span data-lang-key="tab_tools">Tools Khác</span></button>
        </div>
        
        <div class="tab-content">
          <div id="content-control" class="tab-pane active">
            <div class="section-header">
                <span class="section-title" data-lang-key="prompt_list">Danh sách prompt</span>
                <button id="uploadPromptButton"><span class="material-symbols-outlined">upload_file</span><span data-lang-key="import_from_file">Nhập từ file</span></button>
            </div>
            <input type="file" id="fileInput" accept=".txt" style="display: none;">
            <textarea id="prompts" data-lang-placeholder="prompt_placeholder" placeholder="Mỗi prompt một dòng..."></textarea>
            
            <div class="config-row">
                <div>
                    <label data-lang-key="lbl_aspect_ratio">Tỉ lệ ảnh</label>
                    <select id="aspectRatioSelector">
                        <option value="IMAGE_ASPECT_RATIO_SQUARE" data-lang-key="ratio_square">Vuông 1:1</option>
                        <option value="IMAGE_ASPECT_RATIO_LANDSCAPE" data-lang-key="ratio_landscape">Ngang 16:9</option>
                        <option value="IMAGE_ASPECT_RATIO_PORTRAIT" data-lang-key="ratio_portrait">Dọc 9:16</option>
                    </select>
                </div>
                <div>
                    <label data-lang-key="lbl_image_count">Số lượng</label>
                    <select id="imageCountSelector">
                        <option value="1" data-lang-key="img_count_1">1 ảnh</option>
                        <option value="2" data-lang-key="img_count_2">2 ảnh</option>
                        <option value="3" data-lang-key="img_count_3">3 ảnh</option>
                        <option value="4" data-lang-key="img_count_4">4 ảnh</option>
                    </select>
                </div>
                <button id="openRefButton">
                    <span class="material-symbols-outlined">add_photo_alternate</span>
                    <span data-lang-key="btn_ref_images">Ảnh tham chiếu</span>
                    <span id="refCountBadge" style="background: var(--primary-color); color: #000; padding: 0 5px; border-radius: 8px; font-size: 0.7rem; margin-left: 4px;">0</span>
                </button>
            </div>

            <div class="action-controls">
                <button id="mainActionButton" data-lang-title="start_button_title">
                    <span class="material-symbols-outlined">play_arrow</span>
                    <span class="btn-text" data-lang-key="start_button">Bắt đầu</span>
                </button>
                <button id="stopButton" data-lang-title="stop_button_title" disabled>
                    <span class="material-symbols-outlined">stop</span>
                    <span class="btn-text" data-lang-key="stop_button">Dừng</span>
                </button>
            </div>
          </div>

          <div id="content-settings" class="tab-pane">
            <div class="settings-subheader" data-lang-key="subheader_general_settings">Cài đặt Chung</div>
            <div class="settings-grid">
                <label data-lang-key="language_label">Ngôn ngữ:</label>
                <select id="languageSelector">
                    <option value="vi">Tiếng Việt</option>
                    <option value="en">English</option>
                    <option value="hi">हिन्दी (India)</option>
                    <option value="th">ไทย (Thailand)</option>
                    <option value="ur">اردو (Pakistan)</option>
                    <option value="bn">বাংলা (Bangladesh)</option>
                    <option value="es">Español</option>
                </select>
            </div>

            <div class="settings-subheader" data-lang-key="subheader_download_settings">Cài đặt Tải xuống</div>
            <div class="settings-grid">
                <label data-lang-key="download_folder_label">Thư mục lưu:</label>
                <input type="text" id="downloadFolderInput" value="Whisk Downloads">
                
                <label data-lang-key="auto_download_label">Tự động tải:</label>
                <div style="display:flex; align-items:center;">
                    <input type="checkbox" id="autoDownloadCheckbox" checked>
                </div>
            </div>
            
            <div style="margin-top: 15px; font-size: 0.85rem; color: #aaa; font-style: italic; line-height: 1.4;" data-lang-key="downloads_settings_hint">
                Mẹo: Tắt 'Hỏi vị trí lưu...' trong cài đặt tải xuống của trình duyệt để tải tự động không bị gián đoạn.
            </div>
          </div>
          
          <div id="content-tools" class="tab-pane">
             <div class="tool-list" id="toolListContainer"></div>
          </div>
        </div>
    </div>

    <div id="bottom-panel">
        <div class="status-area">
          <progress id="progressBar" value="0" max="100"></progress>
          <div id="liveStatus" data-lang-key="status_ready">Sẵn sàng</div>
        </div>
        <div id="resultsTableContainer">
            <table id="resultsTable">
                <thead><tr id="tableHeaderRow"></tr></thead>
                <tbody id="resultsTableBody"></tbody>
            </table>
        </div>
        <button id="retryAllButton"><span class="material-symbols-outlined">refresh</span> Thử lại các lỗi</button>
    </div>
  </div>
  
  <div id="imageModal"><span id="modalClose">&times;</span><img id="modalImage" src=""></div>

  <!-- Reference Image Modal -->
  <div id="refModal">
    <div class="ref-content">
        <div class="ref-header">
            <h3 class="ref-title" data-lang-key="ref_modal_title">Ảnh tham chiếu</h3>
            <span id="refModalClose" class="ref-close">&times;</span>
        </div>
        <div class="ref-body">
            <div class="ref-section">
                <span class="ref-group-title" data-lang-key="cat_subject">Chủ thể</span>
                <div class="ref-grid">
                    <div class="ref-item-container">
                        <div class="ref-slot" data-cat="MEDIA_CATEGORY_SUBJECT" data-idx="0"><span class="material-symbols-outlined">add</span></div>
                        <textarea class="ref-caption" placeholder="Caption..." data-lang-placeholder="ref_caption_placeholder" data-cat="MEDIA_CATEGORY_SUBJECT" data-idx="0"></textarea>
                    </div>
                    <div class="ref-item-container">
                        <div class="ref-slot" data-cat="MEDIA_CATEGORY_SUBJECT" data-idx="1"><span class="material-symbols-outlined">add</span></div>
                        <textarea class="ref-caption" placeholder="Caption..." data-lang-placeholder="ref_caption_placeholder" data-cat="MEDIA_CATEGORY_SUBJECT" data-idx="1"></textarea>
                    </div>
                </div>
            </div>
            <div class="ref-section">
                <span class="ref-group-title" data-lang-key="cat_scene">Bối cảnh</span>
                <div class="ref-grid">
                     <div class="ref-item-container">
                        <div class="ref-slot" data-cat="MEDIA_CATEGORY_SCENE" data-idx="0"><span class="material-symbols-outlined">add</span></div>
                        <textarea class="ref-caption" placeholder="Caption..." data-lang-placeholder="ref_caption_placeholder" data-cat="MEDIA_CATEGORY_SCENE" data-idx="0"></textarea>
                     </div>
                </div>
            </div>
             <div class="ref-section">
                <span class="ref-group-title" data-lang-key="cat_style">Phong cách</span>
